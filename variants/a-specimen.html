<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="theme-color" content="#f4f3ef">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=IBM+Plex+Mono:wght@400;500&family=Shippori+Mincho+B1:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f4f3ef;
      --ink: #17140f;
      --red: #c41f1f;
      --dim: #8f887a;
      --mono: "IBM Plex Mono", Menlo, Consolas, monospace;
      --jp: "Shippori Mincho B1", "Hiragino Mincho ProN", serif;
      --latin: "Cormorant Garamond", "Times New Roman", serif;
    }

    html, body { overflow-x: hidden; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--jp);
      min-height: 100svh;
    }

    ::selection { background: var(--red); color: #fff; }
    a { color: inherit; text-decoration: none; }

    /* full-bleed anatomy sheet */
    .sheet {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .sheet img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 18%;
      display: block;
    }

    .sheet::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 40%, transparent 40%, rgba(244, 243, 239, 0.55) 100%);
    }

    /* giant outline wordmark over the sheet */
    .ghost {
      position: fixed;
      left: 50%;
      bottom: -0.16em;
      transform: translateX(-50%);
      z-index: 2;
      font-family: var(--latin);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(5rem, 17.5vw, 20rem);
      line-height: 1;
      letter-spacing: -0.03em;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--ink);
      white-space: nowrap;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    /* specimen labels */
    .tag {
      position: absolute;
      z-index: 5;
      background: #fdfdfb;
      border: 1px solid var(--ink);
      box-shadow: 3px 3px 0 rgba(23, 20, 15, 0.22);
      padding: 0.55rem 0.7rem 0.5rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      min-width: 11.5em;
    }

    .tag:hover { background: var(--ink); color: var(--paper); }
    .tag:hover .no { color: var(--red); }
    .tag .no { display: block; color: var(--red); font-size: 0.85em; margin-bottom: 0.35em; }
    .tag .en { display: block; text-transform: uppercase; font-weight: 500; font-size: 1.05em; }
    .tag .jp { display: block; font-family: var(--jp); color: var(--dim); margin-top: 0.3em; letter-spacing: 0.3em; }
    .tag:hover .jp { color: var(--paper); }

    /* red index thread */
    .thread {
      position: absolute;
      z-index: 4;
      height: 1px;
      background: var(--red);
      transform-origin: 0 0;
      pointer-events: none;
      opacity: 0.85;
    }

    .field { position: relative; z-index: 3; min-height: 100svh; }

    /* pinned intro card */
    .intro {
      position: absolute;
      top: 9vh;
      left: 5vw;
      z-index: 5;
      max-width: 21em;
      background: #fdfdfb;
      border: 1px solid var(--ink);
      box-shadow: 4px 4px 0 rgba(23, 20, 15, 0.22);
      padding: 1.1rem 1.3rem;
      font-size: clamp(13px, 1.25vw, 15px);
      line-height: 2.05;
    }

    .intro .head {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--red);
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 0.5em;
      margin-bottom: 0.9em;
    }

    .intro .muted { color: var(--dim); }

    .caption {
      position: fixed;
      left: 1rem;
      bottom: 0.8rem;
      z-index: 6;
      font-family: var(--mono);
      font-size: 0.56rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .caption .r { color: var(--red); }

    @media (max-width: 700px) {
      .intro { position: relative; top: auto; left: auto; margin: 18vh 5vw 2rem; }
      .tag { position: relative; margin: 0.8rem 5vw; display: block; width: fit-content; }
      .thread { display: none; }
      .field { padding-bottom: 30vh; }
    }
  </style>
</head>

<body>
