<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile — synomare</title>
  <meta name="description" content="synomare のプロフィール。テクスト、デザイン、グラフィック。">
  <meta property="og:title" content="Profile — synomare">
  <meta property="og:description" content="synomare のプロフィール。テクスト、デザイン、グラフィック。">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="preconnect" href="https://use.typekit.net" crossorigin>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e5e5e5;
      --muted: #444;
      --line: #222;
      --accent: #fff;
      --font-mincho: "Hina Mincho", "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
      --font-gothic: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      font-size: clamp(16px, 1.6vw, 32px);
    }

    html,
    body {
      overflow-x: hidden;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-mincho);
      -webkit-font-smoothing: antialiased;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100svh;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--muted);
    }

    a:hover {
      border-bottom-color: var(--accent);
      background: rgba(255, 255, 255, 0.1);
    }

    /* Header & Footer */
    header,
    footer {
      padding: 0.8rem 1rem;
      border-color: var(--line);
      font-family: var(--font-gothic);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      z-index: 100;
      background: var(--bg);
    }

    header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
    }

    footer {
      border-top: 1px solid var(--line);
      text-align: right;
    }

    /* Navigation */
    details.nav {
      position: relative;
    }

    details.nav>summary {
      list-style: none;
      cursor: pointer;
      border: 1px solid var(--line);
      padding: 0.2em 0.8em;
      border-radius: 0;
      text-transform: uppercase;
    }

    details.nav>summary::-webkit-details-marker {
      display: none;
    }

    .menu {
      position: absolute;
      right: 0;
      top: 100%;
      margin-top: -1px;
      background: var(--bg);
      border: 1px solid var(--line);
      padding: 1rem;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      z-index: 1000;
    }

    /* Main */
    main {
      position: relative;
      width: 100%;
      max-width: 100%;
      padding: 2rem;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: calc(100svh - 6rem);
    }

    .kicker {
      margin: 0 0 1rem;
      font-family: var(--font-gothic);
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .display {
      margin: 0 0 2.5rem;
      font-weight: 400;
      font-size: clamp(3.2rem, 16vw, 12rem);
      letter-spacing: -0.06em;
      line-height: 0.85;
      word-break: break-word;
    }

    .bio {
      max-width: 34em;
      margin: 0 0 3rem;
      font-size: clamp(0.95rem, 1.4vw, 1.1rem);
      line-height: 2.1;
      letter-spacing: 0.02em;
    }

    .bio .muted {
      color: var(--muted);
    }

    /* Channels */
    .channels {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem 2.5rem;
      padding-top: 1.4rem;
      border-top: 1px solid var(--line);
      font-family: var(--font-gothic);
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .channels a {
      border-bottom: 1px solid var(--muted);
      padding-bottom: 0.15em;
    }

    /* Vertical margin text */
    .z-vert {
      position: absolute;
      top: 4rem;
      right: 0.6rem;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 0.65rem;
      line-height: 2.2;
      white-space: pre;
      color: var(--muted);
      opacity: 0.6;
      pointer-events: none;
    }

    /* Noise Overlay */
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.04;
      mix-blend-mode: overlay;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9998;
      background: radial-gradient(circle at 50% 50%, transparent 60%, rgba(0, 0, 0, 0.5) 100%);
    }

    /* Responsive */
    @media (max-width: 900px) {
      main {
        padding: 1.5rem;
        min-height: calc(100svh - 5rem);
      }

      .bio {
        margin-bottom: 2rem;
      }

      .channels {
        gap: 1rem 1.5rem;
      }

      .z-vert {
        display: none;
      }
    }

    html.wf-loading body {
      opacity: 0;
    }

    html.wf-active body,
    html.wf-inactive body {
      opacity: 1;
      transition: opacity 0.5s;
    }
  </style>
  <script>
    (function (d) {
      var config = { kitId: 'ifg4slm', scriptTimeout: 3000, async: true }, h = d.documentElement, t = setTimeout(function () { h.className = h.className.replace(/\bwf-loading\b/g, "") + " wf-inactive"; }, config.scriptTimeout), tk = d.createElement("script"), f = false, s = d.getElementsByTagName("script")[0], a; h.className += " wf-loading"; tk.src = 'https://use.typekit.net/' + config.kitId + '.js'; tk.async = true; tk.onload = tk.onreadystatechange = function () { a = this.readyState; if (f || a && a != "complete" && a != "loaded") return; f = true; clearTimeout(t); try { Typekit.load(config) } catch (e) { } }; s.parentNode.insertBefore(tk, s)
    })(document);
  </script>
</head>

<body>
  <header>
    <a href="./" class="brand" style="border:none">synomare</a>
    <details class="nav">
      <summary>MENU</summary>
      <nav class="menu" aria-label="site">
        <a href="./">HOME</a>
        <a href="works.html">WORKS</a>

    <h1 class="display">synomare</h1>

    <div class="bio">
      <p>synomare<span class="muted">っていいます。</span>テクスト<span class="muted">を書いて、</span>デザイン<span class="muted">をして、</span>グラフィック<span class="muted">をつくります。</span>演劇の演出<span class="muted">をすることもあります。</span></p>

    <div class="noise-overlay"></div>
  </main>

  <footer>

  </footer>

  <script>
    (function () {
      var y = document.getElementById('year');
      if (y) y.textContent = new Date().getFullYear();
      var theme = document.querySelector('meta[name="theme-color"]');
      if (theme) { var bg = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim(); theme.setAttribute('content', bg) }
    })();
  </script>
  <script>
    (function () {
      var overlay = document.querySelector('.noise-overlay');
      if (!overlay) return;
      var canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      var ctx = canvas.getContext('2d');
      var idata = ctx.createImageData(128, 128);
      var buffer32 = new Uint32Array(idata.data.buffer);
      var len = buffer32.length;
      for (var i = 0; i < len; i++) {
        if (Math.random() < 0.5) buffer32[i] = 0xff000000;
      }
      ctx.putImageData(idata, 0, 0);
      overlay.style.backgroundImage = 'url(' + canvas.toDataURL() + ')';
      overlay.style.backgroundRepeat = 'repeat';
    })();
  </script>
</body>

</html>
