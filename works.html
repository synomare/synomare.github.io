<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Works — synomare</title>
  <meta name="description" content="synomare 作品目録。テクスト、演劇、グラフィック。">
  <meta property="og:title" content="Works — synomare">
  <meta property="og:description" content="synomare 作品目録。テクスト、演劇、グラフィック。">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#f4f3ef">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400;1,500&family=Space+Mono:wght@400;700&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f4f3ef;
      --ink: #17140f;
      --red: #c41f1f;
      --dim: #8f887a;
      --line: #d9d5c9;
      --card: #fdfdfb;
      --mono: "Space Mono", Menlo, Consolas, monospace;
      --jp: "Zen Old Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
      --latin: "EB Garamond", "Times New Roman", serif;
    }

    html, body { overflow-x: hidden; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--jp);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100svh;
    }

    ::selection { background: var(--red); color: #fff; }
    a { color: inherit; text-decoration: none; }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    /* topbar */
    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.4em 1.6em;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--ink);
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      background: var(--paper);
      z-index: 500;
    }

    .topbar .brand { font-weight: 500; }
    .topbar .brand .jp { font-family: var(--jp); color: var(--dim); letter-spacing: 0.3em; margin-left: 1em; }
    .topbar .date { color: var(--red); }
    .topbar nav { margin-left: auto; display: flex; flex-wrap: wrap; gap: 0.4em 1.1em; }
    .topbar nav a:hover { background: var(--ink); color: var(--paper); }
    .topbar nav a[aria-current] { background: var(--ink); color: var(--paper); padding: 0 0.35em; }

    /* specimen tag (shared) */
    .tag {
      background: var(--card);
      border: 1px solid var(--ink);
      box-shadow: 3px 3px 0 rgba(23, 20, 15, 0.22);
      padding: 0.55rem 0.7rem 0.5rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
    }

    a.tag:hover { background: var(--ink); color: var(--paper); }
    .tag .no { display: block; color: var(--red); font-size: 0.85em; margin-bottom: 0.35em; }
    .tag .en { display: block; text-transform: uppercase; font-weight: 500; font-size: 1.05em; }
    .tag .jp { display: block; font-family: var(--jp); color: var(--dim); margin-top: 0.3em; letter-spacing: 0.3em; }
    a.tag:hover .jp { color: var(--paper); }

    /* section head */
    .sec-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--red);
      border-bottom: 1px solid var(--ink);
      padding-bottom: 0.5em;
      margin-bottom: 1.2em;
    }

    .sec-head .r { color: var(--dim); }

    /* red thread */
    .thread {
      position: absolute;
      height: 1px;
      background: var(--red);
      transform-origin: 0 0;
      pointer-events: none;
      opacity: 0.85;
      z-index: 4;
    }

    /* footer caption */
    footer.caption {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.4em 2em;
      padding: 0.7rem 1rem;
      border-top: 1px solid var(--ink);
      font-family: var(--mono);
      font-size: 0.56rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--paper);
    }

    footer.caption .r { color: var(--red); }
    footer.caption .d { color: var(--dim); }

    @media (max-width: 700px) {
      .topbar { font-size: 0.56rem; }
      .topbar nav { margin-left: 0; width: 100%; }
      .topbar .brand .jp { display: none; }
    }

    main { position: relative; padding: clamp(20px, 4vw, 56px) clamp(16px, 3.4vw, 44px) clamp(3rem, 6vw, 4.5rem); }

    .display-row { display: flex; align-items: baseline; gap: 2rem; flex-wrap: wrap; margin: 0 0 clamp(1.6rem, 4vw, 2.8rem); }
    .display {
      margin: 0;
      font-family: var(--latin);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(4.2rem, 16vw, 13rem);
      letter-spacing: -0.03em;
      line-height: 0.8;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--ink);
    }
    .display-row .jp { font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.5em; text-transform: uppercase; color: var(--red); }

    /* plate with pinned tag */
    .plate-wrap { position: relative; margin: 0 0 3.6rem; }
    .plate { margin: 0; border: 1px solid var(--ink); box-shadow: 5px 5px 0 rgba(23, 20, 15, 0.18); position: relative; }
    .plate img { width: 100%; height: auto; display: block; }
    .plate-tag { position: absolute; right: 2.5vw; bottom: -1.4rem; z-index: 5; }
    .plate-thread { position: absolute; right: 12vw; bottom: 3rem; width: 18vw; transform: rotate(-32deg); }

    /* register */
    .register { max-width: 72rem; }
    .register .sec-head { margin-bottom: 0; }

    .work-row {
      display: grid;
      grid-template-columns: 8em 1fr auto;
      gap: 0 2.2em;
      align-items: baseline;
      padding: 1.6em 0.3em;
      border-bottom: 1px solid var(--line);
    }

    a.work-row:hover { background: var(--ink); color: var(--paper); }
    a.work-row:hover .w-no { color: var(--paper); }
    a.work-row:hover .w-desc, a.work-row:hover .w-type, a.work-row:hover .w-year { color: var(--paper); opacity: 0.7; }

    .w-no { font-family: var(--mono); color: var(--red); font-size: 0.72rem; letter-spacing: 0.12em; }
    .w-title { font-size: clamp(1.2rem, 3vw, 2rem); font-weight: 500; letter-spacing: -0.01em; line-height: 1.2; }
    .w-desc { display: block; margin-top: 0.5em; font-size: 0.78rem; line-height: 1.9; color: var(--dim); max-width: 44em; }
    .w-type { font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim); white-space: nowrap; justify-self: end; }

    .more { margin: 0.9rem 0 0; font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
    .more a:hover { background: var(--ink); color: var(--paper); }

    @media (max-width: 700px) {
      .work-row { grid-template-columns: 1fr; gap: 0.4em; }
      .w-type { justify-self: start; }
      .plate-tag { position: relative; right: auto; bottom: auto; display: inline-block; margin-top: 0.9rem; }
      .plate-thread { display: none; }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <a class="brand" href="./">SYNOMARE</a>
    <span class="date">JST <span id="d">----.--.--</span></span>
    <nav aria-label="site">
        <a href="./">INDEX</a>
        <a href="works.html" aria-current="page">WORKS</a>
        <a href="notes/">NOTES</a>
        <a href="links.html">LINKS</a>
        <a href="profile.html">PROFILE</a>
        <a href="mailto:synomare@gmail.com">CONTACT</a>
    </nav>
  </header>

  <main>
    <section class="display-row">
      <h1 class="display">Works</h1>
      <span class="jp">Catalogue — 作品目録</span>
    </section>

    <div class="plate-wrap">
      <figure class="plate">
        <img src="assets/images/graphics/terpsichora.jpg" alt="Terpsichora — synomare" width="2000" height="1414" loading="eager" fetchpriority="high">
      </figure>
      <span class="tag plate-tag"><span class="en">Terpsichora</span><span class="jp">刷りの平面 二〇二五</span></span>
      <div class="thread plate-thread"></div>
    </div>

    <section class="register" aria-label="作品一覧">
      <div class="sec-head"><span>Registered Works — 収蔵一覧</span></div>

      <a class="work-row" href="yugun/index.html">
        <span class="w-no">2025</span>
        <span class="w-main">
          <span class="w-title">嶼群（博物館（たち））</span>
          <span class="w-desc">博物館を舞台にした、土地と記憶をめぐる戯曲。テキスト全文、座談会、対談を収録。</span>
        </span>
        <span class="w-type">演劇 / Theatre</span>
      </a>

      <!-- 作品を追加するときは、下の行をコピーして書き換えてください。
           リンク先のない作品（記録のみ）は <a> を <div> に変えれば同じ見た目で置けます。
      <a class="work-row" href="作品ページのパス or 外部URL">
        <span class="w-no">20XX</span>
        <span class="w-main">
          <span class="w-title">作品タイトル</span>
          <span class="w-desc">一行の説明。媒体・会場・共作者など。</span>
        </span>
        <span class="w-type">テクスト / Text</span>
      </a>
      -->
    </section>

    <p class="more">その他の制作物 — <a href="https://www.instagram.com/syno_mare/?utm_source=qr" target="_blank" rel="noopener">INSTAGRAM</a></p>
  </main>

  <footer class="caption">
    <span>SYNOMARE / WORKS — 作品目録</span>
    <span class="d">&copy; <span id="year"></span> synomare — all rights reserved.</span>
  </footer>
  <script>
    (function () {
      function pad(n) { return n < 10 ? '0' + n : n; }
      var d = document.getElementById('d');
      if (d) {
        var now = new Date(Date.now() + (9 * 60 + new Date().getTimezoneOffset()) * 60000);
        d.textContent = now.getFullYear() + '.' + pad(now.getMonth() + 1) + '.' + pad(now.getDate());
      }
      var y = document.getElementById('year');
      if (y) y.textContent = new Date().getFullYear();
    })();
  </script>
</body>

</html>
