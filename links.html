<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Links — synomare</title>
  <meta name="description" content="synomare の相互リンク・交遊録。">
  <meta property="og:title" content="Links — synomare">
  <meta property="og:description" content="synomare の相互リンク・交遊録。">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#edeae3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Shippori+Mincho+B1:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #edeae3;
      --ink: #141210;
      --faint: #97907f;
      --rule: #d6d0c2;
      --seal: #a33b24;
      --font-mincho: "Shippori Mincho B1", "Hiragino Mincho ProN", "Yu Mincho", serif;
      --font-gothic: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      --font-latin: "Cormorant Garamond", "Times New Roman", serif;
      font-size: clamp(16px, 1.6vw, 32px);
    }

    html,
    body {
      overflow-x: hidden;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-mincho);
      -webkit-font-smoothing: antialiased;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100svh;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--faint);
    }

    a:hover {
      border-bottom-color: var(--ink);
      background: rgba(20, 18, 16, 0.06);
    }

    /* ── 紙面クローム ───────────────────── */
    header,
    footer {
      padding: 0.8rem 1rem;
      font-family: var(--font-gothic);
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      background: var(--paper);
      z-index: 100;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
    }

    header .brand {
      border: none;
      text-transform: lowercase;
      font-family: var(--font-latin);
      font-style: italic;
      font-size: 1.05rem;
      letter-spacing: 0.06em;
    }

    footer {
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      color: var(--faint);
    }

    details.nav {
      position: relative;
    }

    details.nav>summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      border: 1px solid var(--rule);
      padding: 0.2em 0.8em;
      text-transform: uppercase;
    }

    details.nav[open]>summary {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    details.nav>summary::-webkit-details-marker {
      display: none;
    }

    .menu {
      position: absolute;
      right: 0;
      top: 100%;
      margin-top: -1px;
      background: var(--paper);
      border: 1px solid var(--ink);
      padding: 1rem;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      z-index: 1000;
    }

    .menu a {
      border-bottom: 1px solid var(--rule);
      padding-bottom: 0.15em;
    }

    .menu a:hover {
      border-bottom-color: var(--ink);
      background: none;
    }

    /* ── トンボ・柱 ───────────────────── */
    .trim {
      position: fixed;
      width: 14px;
      height: 14px;
      pointer-events: none;
      z-index: 200;
      opacity: 0.55;
    }

    .trim::before,
    .trim::after {
      content: "";
      position: absolute;
      background: var(--ink);
    }

    .trim::before { width: 100%; height: 1px; }
    .trim::after { width: 1px; height: 100%; }
    .trim.tl { top: 6px; left: 6px; }
    .trim.tl::before, .trim.tl::after { top: 0; left: 0; }
    .trim.tr { top: 6px; right: 6px; }
    .trim.tr::before, .trim.tr::after { top: 0; right: 0; }
    .trim.bl { bottom: 6px; left: 6px; }
    .trim.bl::before, .trim.bl::after { bottom: 0; left: 0; }
    .trim.br { bottom: 6px; right: 6px; }
    .trim.br::before, .trim.br::after { bottom: 0; right: 0; }

    .pillar {
      position: fixed;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      font-family: var(--font-gothic);
      font-size: 0.55rem;
      letter-spacing: 0.5em;
      color: var(--faint);
      pointer-events: none;
      z-index: 90;
    }

    /* ── 本文 ─────────────────────── */
    main {
      position: relative;
      width: 100%;
      max-width: 100%;
      padding: 2rem;
      box-sizing: border-box;
    }

    .z-head {
      padding: 3rem 0 2rem;
    }

    .kicker {
      margin: 0 0 1rem;
      font-family: var(--font-gothic);
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .display {
      margin: 0;
      font-weight: 300;
      font-style: italic;
      font-family: var(--font-latin);
      font-size: clamp(3rem, 14vw, 10rem);
      letter-spacing: -0.03em;
      line-height: 0.85;
      filter: url(#etch);
    }

    .display .jp {
      display: inline-block;
      margin-left: 0.25em;
      font-family: var(--font-mincho);
      font-size: 0.22em;
      letter-spacing: 0.4em;
      color: var(--faint);
      vertical-align: baseline;
    }

    /* ── 交遊録 ─────────────────── */
    .z-register {
      border-top: 1px solid var(--ink);
      margin-right: clamp(0rem, 8vw, 6rem);
    }

    .link-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: baseline;
      gap: 0 2rem;
      padding: 1.3rem 0.4rem;
      border: none;
      border-bottom: 1px solid var(--rule);
      transition: background 0.25s ease;
    }

    a.link-row:hover {
      background: rgba(20, 18, 16, 0.05);
      border-bottom-color: var(--rule);
    }

    a.link-row:hover .l-title {
      border-bottom: 1px solid var(--ink);
    }

    .l-title {
      font-size: clamp(1.1rem, 2.6vw, 1.8rem);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .l-desc {
      font-family: var(--font-gothic);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--faint);
      white-space: nowrap;
      justify-self: end;
    }

    .z-note {
      margin: 2.2rem 0 1rem;
      font-family: var(--font-gothic);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--faint);
    }

    /* ── 紙の質感 ─────────────── */
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.05;
      mix-blend-mode: multiply;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9998;
      background: radial-gradient(circle at 50% 45%, transparent 62%, rgba(20, 18, 16, 0.10) 100%);
    }

    @media (max-width: 900px) {
      main {
        padding: 1.5rem;
      }

      .z-head {
        padding: 2rem 0 1.5rem;
      }

      .z-register {
        margin-right: 0;
      }

      .link-row {
        grid-template-columns: 1fr;
        gap: 0.4rem;
      }

      .l-desc {
        justify-self: start;
      }

      .pillar {
        display: none;
      }
    }
  </style>
</head>

<body>
  <svg width="0" height="0" aria-hidden="true" style="position:absolute">
    <filter id="etch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="19" result="n" />
      <feDisplacementMap in="SourceGraphic" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <header>
    <a href="./" class="brand">synomare</a>
    <details class="nav">
      <summary>MENU</summary>
      <nav class="menu" aria-label="site">
        <a href="./">HOME</a>
        <a href="works.html">WORKS</a>
        <a href="notes/">NOTES</a>
        <a href="links.html">LINKS</a>
        <a href="profile.html">PROFILE</a>
        <a href="about.html">ABOUT</a>
        <a href="mailto:synomare@gmail.com">CONTACT</a>
      </nav>
    </details>
  </header>

  <main id="content">
    <section class="z-head">
      <p class="kicker">Appendix — 附録 / 交遊録</p>
      <h1 class="display">Links<span class="jp">交遊録</span></h1>
    </section>

    <section class="z-register" aria-label="相互リンク">
      <!-- リンクを追加するときは、下の行をコピーして書き換えてください。
      <a href="https://example.com" class="link-row" target="_blank" rel="noopener">
        <span class="l-title">サイト名</span>
        <span class="l-desc">主宰者・ひとこと</span>
      </a>
      -->
      <a href="https://mori-chka.github.io/bunko-site/" class="link-row" target="_blank" rel="noopener">
        <span class="l-title">さなぎのなかから</span>
        <span class="l-desc">もりちか</span>
      </a>
      <!-- Add more links here -->
    </section>

    <p class="z-note">相互リンクを希望される方は、奥付の連絡先までお便りください。</p>

    <div class="noise-overlay"></div>
  </main>

  <footer>
    <small>synomare 版 — 附録</small>
    <small>&copy; <span id="year"></span> synomare. All rights reserved.</small>
  </footer>

  <script>
    (function () {
      var y = document.getElementById('year');
      if (y) y.textContent = new Date().getFullYear();
      var theme = document.querySelector('meta[name="theme-color"]');
      if (theme) { var bg = getComputedStyle(document.documentElement).getPropertyValue('--paper').trim(); theme.setAttribute('content', bg) }
    })();
  </script>
  <script>
    (function () {
      var overlay = document.querySelector('.noise-overlay');
      if (!overlay) return;
      var canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      var ctx = canvas.getContext('2d');
      var idata = ctx.createImageData(128, 128);
      var buffer32 = new Uint32Array(idata.data.buffer);
      var len = buffer32.length;
      for (var i = 0; i < len; i++) {
        if (Math.random() < 0.5) buffer32[i] = 0xff000000;
      }
      ctx.putImageData(idata, 0, 0);
      overlay.style.backgroundImage = 'url(' + canvas.toDataURL() + ')';
      overlay.style.backgroundRepeat = 'repeat';
    })();
  </script>
</body>

</html>
