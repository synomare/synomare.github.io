<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Links — synomare</title>
  <meta name="description" content="synomare の相互リンク・交遊録。">
  <meta property="og:title" content="Links — synomare">
  <meta property="og:description" content="synomare の相互リンク・交遊録。">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#f4f3ef">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400;1,500&family=Space+Mono:wght@400;700&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f4f3ef;
      --ink: #17140f;
      --red: #c41f1f;
      --dim: #8f887a;
      --line: #d9d5c9;
      --card: #fdfdfb;
      --mono: "Space Mono", Menlo, Consolas, monospace;
      --jp: "Zen Old Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
      --latin: "EB Garamond", "Times New Roman", serif;
    }

    html, body { overflow-x: hidden; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--jp);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100svh;
    }

    ::selection { background: var(--red); color: #fff; }
    a { color: inherit; text-decoration: none; }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    /* topbar */
    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.4em 1.6em;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--ink);
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      background: var(--paper);
      z-index: 500;
    }

    .topbar .brand { font-weight: 500; }
    .topbar .brand .jp { font-family: var(--jp); color: var(--dim); letter-spacing: 0.3em; margin-left: 1em; }
    .topbar .date { color: var(--red); }
    .topbar nav { margin-left: auto; display: flex; flex-wrap: wrap; gap: 0.4em 1.1em; }
    .topbar nav a:hover { background: var(--ink); color: var(--paper); }
    .topbar nav a[aria-current] { background: var(--ink); color: var(--paper); padding: 0 0.35em; }

    /* specimen tag (shared) */
    .tag {
      background: var(--card);
      border: 1px solid var(--ink);
      box-shadow: 3px 3px 0 rgba(23, 20, 15, 0.22);
      padding: 0.55rem 0.7rem 0.5rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
    }

    a.tag:hover { background: var(--ink); color: var(--paper); }
    .tag .no { display: block; color: var(--red); font-size: 0.85em; margin-bottom: 0.35em; }
    .tag .en { display: block; text-transform: uppercase; font-weight: 500; font-size: 1.05em; }
    .tag .jp { display: block; font-family: var(--jp); color: var(--dim); margin-top: 0.3em; letter-spacing: 0.3em; }
    a.tag:hover .jp { color: var(--paper); }

    /* section head */
    .sec-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--red);
      border-bottom: 1px solid var(--ink);
      padding-bottom: 0.5em;
      margin-bottom: 1.2em;
    }

    .sec-head .r { color: var(--dim); }

    /* red thread */
    .thread {
      position: absolute;
      height: 1px;
      background: var(--red);
      transform-origin: 0 0;
      pointer-events: none;
      opacity: 0.85;
      z-index: 4;
    }

    /* footer caption */
    footer.caption {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.4em 2em;
      padding: 0.7rem 1rem;
      border-top: 1px solid var(--ink);
      font-family: var(--mono);
      font-size: 0.56rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--paper);
    }

    footer.caption .r { color: var(--red); }
    footer.caption .d { color: var(--dim); }

    @media (max-width: 700px) {
      .topbar { font-size: 0.56rem; }
      .topbar nav { margin-left: 0; width: 100%; }
      .topbar .brand .jp { display: none; }
    }

    main { position: relative; padding: clamp(20px, 4vw, 56px) clamp(16px, 3.4vw, 44px) clamp(3rem, 6vw, 4.5rem); }

    .display-row { display: flex; align-items: baseline; gap: 2rem; flex-wrap: wrap; margin: 0 0 clamp(1.6rem, 4vw, 2.8rem); }
    .display {
      margin: 0;
      font-family: var(--latin);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(3.4rem, 13vw, 10rem);
      letter-spacing: -0.03em;
      line-height: 0.8;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--ink);
    }
    .display-row .jp { font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.5em; text-transform: uppercase; color: var(--red); }

    .register { max-width: 72rem; }

    .link-row { display: flex; align-items: baseline; gap: 1.4em; padding: 1.1em 0.3em; border-bottom: 1px solid var(--line); }
    a.link-row:hover { background: var(--ink); color: var(--paper); }
    a.link-row:hover .no, a.link-row:hover .who { color: var(--paper); opacity: 0.75; }
    .link-row .no { font-family: var(--mono); color: var(--red); flex-shrink: 0; font-size: 0.72rem; letter-spacing: 0.12em; }
    .link-row .site { font-size: clamp(1rem, 2.4vw, 1.5rem); font-weight: 500; }
    .link-row .dots { flex: 1; border-bottom: 1px dotted var(--line); transform: translateY(-0.3em); min-width: 2em; }
    a.link-row:hover .dots { border-bottom-color: var(--paper); }
    .link-row .who { color: var(--dim); font-size: 0.74rem; letter-spacing: 0.14em; flex-shrink: 0; }

    .note { margin: 2.4rem 0 0; font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.16em; color: var(--dim); }
  </style>
</head>

<body>
  <header class="topbar">
    <a class="brand" href="./">SYNOMARE</a>
    <span class="date">JST <span id="d">----.--.--</span></span>
    <nav aria-label="site">
        <a href="./">INDEX</a>
        <a href="works.html">WORKS</a>
        <a href="notes/">NOTES</a>
        <a href="links.html" aria-current="page">LINKS</a>
        <a href="profile.html">PROFILE</a>
        <a href="mailto:synomare@gmail.com">CONTACT</a>
    </nav>
  </header>

  <main id="content">
    <section class="display-row">
      <h1 class="display">Links</h1>
      <span class="jp">Appendix — 交遊録</span>
    </section>

    <section class="register" aria-label="相互リンク">
      <div class="sec-head"><span>Mutual Links — 交遊録</span></div>
      <!-- リンクを追加するときは、下の行をコピーして書き換えてください。
      <a href="https://example.com" class="link-row" target="_blank" rel="noopener">
        <span class="site">サイト名</span><span class="dots"></span><span class="who">主宰者</span>
      </a>
      -->
      <a href="https://mori-chka.github.io/bunko-site/" class="link-row" target="_blank" rel="noopener">
        <span class="site">さなぎのなかから</span><span class="dots"></span><span class="who">もりちか</span>
      </a>
      <!-- Add more links here -->
    </section>

    <p class="note">相互リンクを希望される方は、奥付の連絡先までお便りください。</p>
  </main>

  <footer class="caption">
    <span>SYNOMARE / LINKS — 交遊録</span>
    <span class="d">&copy; <span id="year"></span> synomare — all rights reserved.</span>
  </footer>
  <script>
    (function () {
      function pad(n) { return n < 10 ? '0' + n : n; }
      var d = document.getElementById('d');
      if (d) {
        var now = new Date(Date.now() + (9 * 60 + new Date().getTimezoneOffset()) * 60000);
        d.textContent = now.getFullYear() + '.' + pad(now.getMonth() + 1) + '.' + pad(now.getDate());
      }
      var y = document.getElementById('year');
      if (y) y.textContent = new Date().getFullYear();
    })();
  </script>
</body>

</html>
