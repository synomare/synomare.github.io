<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} — synomare Notes</title>
  <meta name="description" content="{{SUMMARY}}">
  <meta property="og:title" content="{{TITLE}} — synomare Notes">
  <meta property="og:description" content="{{SUMMARY}}">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#f4f3ef">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=IBM+Plex+Mono:wght@400;500&family=Shippori+Mincho+B1:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f4f3ef;
      --ink: #17140f;
      --red: #c41f1f;
      --dim: #8f887a;
      --line: #d9d5c9;
      --card: #fdfdfb;
      --mono: "IBM Plex Mono", Menlo, Consolas, monospace;
      --jp: "Shippori Mincho B1", "Hiragino Mincho ProN", "Yu Mincho", serif;
      --latin: "Cormorant Garamond", "Times New Roman", serif;
    }

    html, body { overflow-x: hidden; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--jp);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100svh;
    }

    ::selection { background: var(--red); color: #fff; }
    a { color: inherit; text-decoration: none; }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    /* topbar */
    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.4em 1.6em;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--ink);
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      background: var(--paper);
      z-index: 500;
    }

    .topbar .brand { font-weight: 500; }
    .topbar .brand .jp { font-family: var(--jp); color: var(--dim); letter-spacing: 0.3em; margin-left: 1em; }
    .topbar .date { color: var(--red); }
    .topbar nav { margin-left: auto; display: flex; flex-wrap: wrap; gap: 0.4em 1.1em; }
    .topbar nav a:hover { background: var(--ink); color: var(--paper); }
    .topbar nav a[aria-current] { background: var(--ink); color: var(--paper); padding: 0 0.35em; }

    /* specimen tag (shared) */
    .tag {
      background: var(--card);
      border: 1px solid var(--ink);
      box-shadow: 3px 3px 0 rgba(23, 20, 15, 0.22);
      padding: 0.55rem 0.7rem 0.5rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
    }

    a.tag:hover { background: var(--ink); color: var(--paper); }
    .tag .no { display: block; color: var(--red); font-size: 0.85em; margin-bottom: 0.35em; }
    .tag .en { display: block; text-transform: uppercase; font-weight: 500; font-size: 1.05em; }
    .tag .jp { display: block; font-family: var(--jp); color: var(--dim); margin-top: 0.3em; letter-spacing: 0.3em; }
    a.tag:hover .jp { color: var(--paper); }

    /* section head */
    .sec-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--red);
      border-bottom: 1px solid var(--ink);
      padding-bottom: 0.5em;
      margin-bottom: 1.2em;
    }

    .sec-head .r { color: var(--dim); }

    /* red thread */
    .thread {
      position: absolute;
      height: 1px;
      background: var(--red);
      transform-origin: 0 0;
      pointer-events: none;
      opacity: 0.85;
      z-index: 4;
    }

    /* footer caption */
    footer.caption {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.4em 2em;
      padding: 0.7rem 1rem;
      border-top: 1px solid var(--ink);
      font-family: var(--mono);
      font-size: 0.56rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--paper);
    }

    footer.caption .r { color: var(--red); }
    footer.caption .d { color: var(--dim); }

    @media (max-width: 700px) {
      .topbar { font-size: 0.56rem; }
      .topbar nav { margin-left: 0; width: 100%; }
      .topbar .brand .jp { display: none; }
    }

    main { position: relative; padding: clamp(20px, 4vw, 56px) clamp(16px, 3.4vw, 44px) clamp(3rem, 6vw, 4.5rem); }
    .wrap { max-width: 74ch; }

    nav.breadcrumb { margin-bottom: 1.6rem; font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); }
    nav.breadcrumb a:hover { background: var(--ink); color: var(--paper); }

    h1 { font-weight: 500; font-size: clamp(24px, 3.4vw, 34px); letter-spacing: -0.01em; margin: 0 0 .6rem; }
    time { display: block; color: var(--red); font-family: var(--mono); font-size: .66rem; letter-spacing: 0.15em; margin-bottom: 2rem; }

    article { font-size: clamp(16px, 1.9vw, 18px); line-height: 2.0; }
    article p { margin: 0 0 1.2rem; }
    article a { border-bottom: 1px solid var(--dim); }
    article a:hover { background: var(--ink); color: var(--paper); border-bottom-color: var(--ink); }
    article img { max-width: 100%; height: auto; border: 1px solid var(--ink); box-shadow: 4px 4px 0 rgba(23, 20, 15, 0.18); }

    .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin: 0 0 1.2rem; border: 1px solid var(--ink); }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    .entry-nav { display: flex; flex-wrap: wrap; gap: .6rem 1.2rem; margin-top: 2.6rem; font-family: var(--mono); font-size: .64rem; letter-spacing: 0.1em; }
    .entry-nav a { border: 1px solid var(--ink); padding: .4rem .7rem; background: var(--card); box-shadow: 2px 2px 0 rgba(23, 20, 15, 0.2); }
    .entry-nav a:hover { background: var(--ink); color: var(--paper); }
  </style>
</head>

<body>
  <a class="sr-only" href="#main">Skip to Content</a>
  <header class="topbar">
    <a class="brand" href="../">SYNOMARE<span class="jp">標本帖</span></a>
    <span class="date">JST <span id="d">----.--.--</span></span>
    <nav aria-label="site">
        <a href="../">INDEX</a>
        <a href="../works.html">WORKS</a>
        <a href="../notes/" aria-current="page">NOTES</a>
        <a href="../links.html">LINKS</a>
        <a href="../profile.html">PROFILE</a>
        <a href="../about.html">ABOUT</a>
        <a href="mailto:synomare@gmail.com">CONTACT</a>
    </nav>
  </header>

  <main id="main">
    <div class="wrap">
      <nav class="breadcrumb"><a href="../">INDEX</a> / <a href="index.html">NOTES</a> / {{TITLE}}</nav>
      <article class="entry" data-slug="{{SLUG}}">
        <h1>{{TITLE}}</h1>
        <time datetime="{{DATE}}">SPEC. — {{DATE}}</time>
        {{CONTENT}}
      </article>
      <nav class="entry-nav" id="entryNav" aria-label="記事ナビゲーション"></nav>
    </div>
  </main>

  <footer class="caption">
    <span>SYNOMARE — SPECIMEN SHEET / NOTES — 雑記</span>
    <span class="r">観察は変形である</span>
    <span class="d">&copy; <span id="year"></span> synomare — all rights reserved.</span>
  </footer>
  <script>
    (function () {
      function pad(n) { return n < 10 ? '0' + n : n; }
      var d = document.getElementById('d');
      if (d) {
        var now = new Date(Date.now() + (9 * 60 + new Date().getTimezoneOffset()) * 60000);
        d.textContent = now.getFullYear() + '.' + pad(now.getMonth() + 1) + '.' + pad(now.getDate());
      }
      var y = document.getElementById('year');
      if (y) y.textContent = new Date().getFullYear();
    })();
  </script>
  <script src="posts.js"></script>
  <script>
    (function () {
      var nav = document.getElementById('entryNav');
      var article = document.querySelector('.entry');
      if (!nav || !article) return;
      var slug = article.getAttribute('data-slug');
      var posts = (window.__SYNOMARE_POSTS__ || []).slice();
      if (!posts.length) {
        var back = document.createElement('a');
        back.href = 'index.html';
        back.textContent = '一覧へ戻る';
        nav.appendChild(back);
        return;
      }
      posts.sort(function (a, b) {
        var timeA = a && a.date ? Date.parse(a.date) : NaN;
        var timeB = b && b.date ? Date.parse(b.date) : NaN;
        if (timeA === timeB) return 0;
        if (isNaN(timeA)) return 1;
        if (isNaN(timeB)) return -1;
        return timeA < timeB ? 1 : -1;
      });
      var backLink = document.createElement('a');
      backLink.href = 'index.html';
      backLink.textContent = '一覧へ戻る';
      nav.appendChild(backLink);
      var index = posts.findIndex(function (p) { return p.slug === slug });
      if (index !== -1) {
        if (posts[index - 1]) {
          var newer = document.createElement('a');
          newer.href = posts[index - 1].href || posts[index - 1].slug + '.html';
          newer.textContent = '次の記事：' + posts[index - 1].title;
          nav.appendChild(newer);
        }
        if (posts[index + 1]) {
          var older = document.createElement('a');
          older.href = posts[index + 1].href || posts[index + 1].slug + '.html';
          older.textContent = '前の記事：' + posts[index + 1].title;
          nav.appendChild(older);
        }
      }
    })();
  </script>
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</body>

</html>
