<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} — synomare Notes</title>
  <meta name="description" content="{{SUMMARY}}">
  <meta property="og:title" content="{{TITLE}} — synomare Notes">
  <meta property="og:description" content="{{SUMMARY}}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://synomare.github.io/notes/{{SLUG}}.html">
  <meta name="theme-color" content="#edeae3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Shippori+Mincho+B1:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #edeae3;
      --ink: #141210;
      --faint: #97907f;
      --rule: #d6d0c2;
      --seal: #a33b24;
      --maxw: 75ch;
      --font-mincho: "Shippori Mincho B1", "Hiragino Mincho ProN", "Yu Mincho", serif;
      --font-gothic: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      --font-latin: "Cormorant Garamond", "Times New Roman", serif;
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font: 400 16px/1.7 var(--font-mincho);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100svh;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--faint);
    }

    a:hover {
      border-bottom-color: var(--ink);
      background: rgba(20, 18, 16, 0.06);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0
    }

    header,
    footer {
      padding: 0.8rem 1rem;
      font-family: var(--font-gothic);
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      background: var(--paper);
      z-index: 100;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
    }

    header .brand {
      border: none;
      text-transform: lowercase;
      font-family: var(--font-latin);
      font-style: italic;
      font-size: 1.05rem;
      letter-spacing: 0.06em;
    }

    footer {
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      color: var(--faint);
    }

    details.nav {
      position: relative
    }

    details.nav>summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      border: 1px solid var(--rule);
      padding: 0.2em 0.8em;
      text-transform: uppercase;
    }

    details.nav[open]>summary {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    details.nav>summary::-webkit-details-marker {
      display: none
    }

    .menu {
      position: absolute;
      right: 0;
      top: 100%;
      margin-top: -1px;
      background: var(--paper);
      border: 1px solid var(--ink);
      padding: 1rem;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      z-index: 1000;
    }

    .menu a {
      border-bottom: 1px solid var(--rule);
      padding-bottom: 0.15em;
    }

    .menu a:hover {
      border-bottom-color: var(--ink);
      background: none;
    }

    .trim {
      position: fixed;
      width: 14px;
      height: 14px;
      pointer-events: none;
      z-index: 200;
      opacity: 0.55;
    }

    .trim::before,
    .trim::after {
      content: "";
      position: absolute;
      background: var(--ink);
    }

    .trim::before { width: 100%; height: 1px; }
    .trim::after { width: 1px; height: 100%; }
    .trim.tl { top: 6px; left: 6px; }
    .trim.tl::before, .trim.tl::after { top: 0; left: 0; }
    .trim.tr { top: 6px; right: 6px; }
    .trim.tr::before, .trim.tr::after { top: 0; right: 0; }
    .trim.bl { bottom: 6px; left: 6px; }
    .trim.bl::before, .trim.bl::after { bottom: 0; left: 0; }
    .trim.br { bottom: 6px; right: 6px; }
    .trim.br::before, .trim.br::after { bottom: 0; right: 0; }

    main {
      padding: clamp(24px, 6vw, 80px)
    }

    .wrap {
      max-width: var(--maxw);
      margin: 0 auto
    }

    nav.breadcrumb {
      margin-bottom: 1.4rem;
      font-family: var(--font-gothic);
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      color: var(--faint);
    }

    h1 {
      font-weight: 400;
      font-size: clamp(24px, 3.2vw, 32px);
      letter-spacing: -0.02em;
      margin: 0 0 .8rem
    }

    time {
      display: block;
      color: var(--faint);
      font-family: var(--font-gothic);
      font-size: .75rem;
      letter-spacing: 0.15em;
      margin-bottom: 1.8rem
    }

    article {
      font-size: clamp(17px, 2vw, 19px);
      line-height: 1.9
    }

    article p {
      margin: 0 0 1.2rem
    }

    article img {
      max-width: 100%;
      height: auto;
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      margin: 0 0 1.2rem;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 1px solid var(--rule);
    }

    .entry-nav {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem 1.2rem;
      margin-top: 2.4rem;
      font-family: var(--font-gothic);
      font-size: .7rem;
      letter-spacing: 0.1em;
    }

    .entry-nav a {
      border: 1px solid var(--rule);
      padding: .35rem .65rem;
    }

    .entry-nav a:hover {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.05;
      mix-blend-mode: multiply;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9998;
      background: radial-gradient(circle at 50% 45%, transparent 62%, rgba(20, 18, 16, 0.10) 100%);
    }

    @media (max-width:520px) {
      body {
        font-size: 15px
      }
    }
  </style>
</head>

<body>
  <a class="sr-only" href="#main">Skip to Content</a>
  <header>
    <a href="../" class="brand">synomare</a>
    <details class="nav">
      <summary>MENU</summary>
      <nav class="menu" aria-label="site">
        <a href="../">HOME</a>
        <a href="../works.html">WORKS</a>
        <a href="index.html">NOTES</a>
        <a href="../links.html">LINKS</a>
        <a href="../profile.html">PROFILE</a>
        <a href="../about.html">ABOUT</a>
        <a href="mailto:synomare@gmail.com">CONTACT</a>
      </nav>
    </details>
  </header>
  <main id="main">
    <div class="wrap">
      <nav class="breadcrumb"><a href="../">HOME</a> / <a href="index.html">NOTES</a> / <strong>{{TITLE}}</strong></nav>
      <article class="entry" data-slug="{{SLUG}}">
        <h1>{{TITLE}}</h1>
        <time datetime="{{DATE}}">{{DATE}}</time>
        {{CONTENT}}
      </article>
      <nav class="entry-nav" id="entryNav" aria-label="記事ナビゲーション"></nav>
    </div>
    <div class="noise-overlay"></div>
  </main>
  <footer>
    <small>synomare 版 — 雑記</small>
    <small>© <span id="year"></span> synomare — all rights reserved.</small>
  </footer>
  <script>
    (function () {
      var y = document.getElementById('year'); if (y) y.textContent = new Date().getFullYear();
      var theme = document.querySelector('meta[name="theme-color"]'); if (theme) { var bg = getComputedStyle(document.documentElement).getPropertyValue('--paper').trim(); theme.setAttribute('content', bg) }
    })();
  </script>
  <script>
    (function () {
      var overlay = document.querySelector('.noise-overlay');
      if (!overlay) return;
      var canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      var ctx = canvas.getContext('2d');
      var idata = ctx.createImageData(128, 128);
      var buffer32 = new Uint32Array(idata.data.buffer);
      var len = buffer32.length;
      for (var i = 0; i < len; i++) {
        if (Math.random() < 0.5) buffer32[i] = 0xff000000;
      }
      ctx.putImageData(idata, 0, 0);
      overlay.style.backgroundImage = 'url(' + canvas.toDataURL() + ')';
      overlay.style.backgroundRepeat = 'repeat';
    })();
  </script>
  <script src="posts.js"></script>
  <script>
    (function () {
      var nav = document.getElementById('entryNav');
      var article = document.querySelector('.entry');
      if (!nav || !article) return;
      var slug = article.getAttribute('data-slug');
      var posts = (window.__SYNOMARE_POSTS__ || []).slice();
      if (!posts.length) {
        var back = document.createElement('a');
        back.href = 'index.html';
        back.textContent = '一覧へ戻る';
        nav.appendChild(back);
        return;
      }
      posts.sort(function (a, b) {
        var timeA = a && a.date ? Date.parse(a.date) : NaN;
        var timeB = b && b.date ? Date.parse(b.date) : NaN;
        if (timeA === timeB) return 0;
        if (isNaN(timeA)) return 1;
        if (isNaN(timeB)) return -1;
        return timeA < timeB ? 1 : -1;
      });
      var backLink = document.createElement('a');
      backLink.href = 'index.html';
      backLink.textContent = '一覧へ戻る';
      nav.appendChild(backLink);
      var index = posts.findIndex(function (p) { return p.slug === slug });
      if (index !== -1) {
        if (posts[index - 1]) {
          var newer = document.createElement('a');
          newer.href = posts[index - 1].href || posts[index - 1].slug + '.html';
          newer.textContent = '次の記事：' + posts[index - 1].title;
          nav.appendChild(newer);
        }
        if (posts[index + 1]) {
          var older = document.createElement('a');
          older.href = posts[index + 1].href || posts[index + 1].slug + '.html';
          older.textContent = '前の記事：' + posts[index + 1].title;
          nav.appendChild(older);
        }
      }
    })();
  </script>
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</body>

</html>
