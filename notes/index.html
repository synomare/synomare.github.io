<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes — synomare</title>
  <meta name="description" content="synomare の雑記・断章。">
  <meta property="og:title" content="Notes — synomare">
  <meta property="og:description" content="synomare の雑記・断章。">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://use.typekit.net" crossorigin>
  <style>
    :root{
      --paper: #f2efe8;
      --ink: #1a160f;
      --faint: #8d8577;
      --rule: #cfc8b8;
      --seal: #a33b24;
      --maxw: 75ch;
      --font-mincho: "Hina Mincho", "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
      --font-gothic: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      --font-latin: "Times New Roman", Times, Georgia, serif;
    }
    html,body{height:100%}
    body{margin:0; background:var(--paper); color:var(--ink); font:400 16px/1.7 var(--font-mincho); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; display:grid; grid-template-rows:auto 1fr auto; min-height:100svh}
    a{color:inherit; text-decoration:none; border-bottom:1px solid var(--faint)}
    a:hover{border-bottom-color:var(--ink); background:rgba(26,22,15,0.06)}
    .sr-only{position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0}
    header,footer{padding:.8rem 1rem; font-family:var(--font-gothic); font-size:.62rem; letter-spacing:.14em; background:var(--paper); z-index:100}
    header{display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--rule); position:sticky; top:0}
    header .brand{border:none; letter-spacing:.18em}
    footer{border-top:1px solid var(--rule); display:flex; justify-content:space-between; color:var(--faint)}
    details.nav{position:relative}
    details.nav>summary{list-style:none; cursor:pointer; user-select:none; border:1px solid var(--rule); padding:.2em .8em; text-transform:uppercase}
    details.nav[open]>summary{background:var(--ink); color:var(--paper); border-color:var(--ink)}
    details.nav>summary::-webkit-details-marker{display:none}
    .menu{position:absolute; right:0; top:100%; margin-top:-1px; background:var(--paper); border:1px solid var(--ink); padding:1rem; min-width:180px; display:flex; flex-direction:column; gap:.8rem; z-index:1000}
    .menu a{border-bottom:1px solid var(--rule); padding-bottom:.15em}
    .menu a:hover{border-bottom-color:var(--ink); background:none}
    .trim{position:fixed; width:14px; height:14px; pointer-events:none; z-index:200; opacity:.55}
    .trim::before,.trim::after{content:""; position:absolute; background:var(--ink)}
    .trim::before{width:100%; height:1px}
    .trim::after{width:1px; height:100%}
    .trim.tl{top:6px; left:6px}.trim.tl::before,.trim.tl::after{top:0; left:0}
    .trim.tr{top:6px; right:6px}.trim.tr::before,.trim.tr::after{top:0; right:0}
    .trim.bl{bottom:6px; left:6px}.trim.bl::before,.trim.bl::after{bottom:0; left:0}
    .trim.br{bottom:6px; right:6px}.trim.br::before,.trim.br::after{bottom:0; right:0}
    .pillar{position:fixed; top:50%; right:8px; transform:translateY(-50%); writing-mode:vertical-rl; font-family:var(--font-gothic); font-size:.55rem; letter-spacing:.5em; color:var(--faint); pointer-events:none; z-index:90}
    main{padding:clamp(24px,6vw,80px)}
    .wrap{max-width:var(--maxw); margin:0 auto}
    .kicker{margin:0 0 1rem; font-family:var(--font-gothic); font-size:.6rem; letter-spacing:.35em; text-transform:uppercase; color:var(--faint)}
    h1{font-weight:400; font-family:var(--font-latin); font-size:clamp(2.2rem,8vw,4.5rem); letter-spacing:-.04em; line-height:.9; margin:0 0 .8rem}
    h1 .jp{display:inline-block; margin-left:.25em; font-family:var(--font-mincho); font-size:.3em; letter-spacing:.4em; color:var(--faint)}
    .lead{margin:0 0 1.8rem; font-size:clamp(15px,1.9vw,17px); color:var(--faint)}
    .post-list{list-style:none; margin:0; padding:0; border-top:1px solid var(--ink)}
    .post-list li{margin:0; padding:clamp(14px,2.2vw,20px) 0; border-bottom:1px solid var(--rule); display:flex; flex-direction:column; gap:.35rem}
    .post-list a{display:block; color:inherit; border:none}
    .post-list a:hover{background:rgba(26,22,15,0.05)}
    .post-list a:hover strong{border-bottom:1px solid var(--ink)}
    .post-list strong{display:inline; font-weight:400; font-size:clamp(20px,2.6vw,28px); letter-spacing:-.02em}
    .post-list time{color:var(--faint); font-family:var(--font-gothic); font-size:.75rem; letter-spacing:.15em}
    .post-list p{margin:.4rem 0 0; font-size:clamp(14px,1.9vw,16px); color:var(--faint)}
    .post-meta{display:block; font-size:.85rem}
    nav.breadcrumb{margin-bottom:1.4rem; font-family:var(--font-gothic); font-size:.62rem; letter-spacing:.14em; color:var(--faint)}
    .noise-overlay{position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999; opacity:.05; mix-blend-mode:multiply}
    body::after{content:""; position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9998; background:radial-gradient(circle at 50% 45%, transparent 62%, rgba(26,22,15,0.10) 100%)}
    @media (max-width:520px){body{font-size:15px} .pillar{display:none}}
    html.wf-loading body{opacity:0}
    html.wf-active body, html.wf-inactive body{opacity:1; transition:opacity .5s}
  </style>
  <script>
  (function(d){
    var config={kitId:'ifg4slm',scriptTimeout:3000,async:true},h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
  })(document);
  </script>
</head>
<body>
  <a class="sr-only" href="#main">Skip to Content</a>
  <div class="trim tl" aria-hidden="true"></div>
  <div class="trim tr" aria-hidden="true"></div>
  <div class="trim bl" aria-hidden="true"></div>
  <div class="trim br" aria-hidden="true"></div>
  <div class="pillar" aria-hidden="true">雑記 — 断章</div>
  <header>
    <a href="../" class="brand">synomare</a>
    <details class="nav">
      <summary>MENU</summary>
      <nav class="menu" aria-label="site">
        <a href="../">HOME</a>
        <a href="../works.html">WORKS</a>
        <a href="../links.html">LINKS</a>
        <a href="../profile.html">PROFILE</a>
        <a href="../about.html">ABOUT</a>
        <a href="mailto:synomare@gmail.com">CONTACT</a>
      </nav>
    </details>
  </header>
  <main id="main">
    <div class="wrap">
      <nav class="breadcrumb"><a href="../">HOME</a> / <strong>NOTES</strong></nav>
      <p class="kicker">Notes — 雑記 / 断章</p>
      <h1>NOTES<span class="jp">雑記</span></h1>
      <p class="lead">書いたものやメモをここにまとめています。新しい記事から順に並びます。</p>
      <ul class="post-list" id="postList" aria-live="polite"></ul>
    </div>
    <div class="noise-overlay"></div>
  </main>
  <footer>
    <small>synomare 版 — 雑記</small>
    <small>© <span id="year"></span> synomare — all rights reserved.</small>
  </footer>
  <script>
    (function(){
      var y=document.getElementById('year'); if(y) y.textContent=new Date().getFullYear();
      var theme=document.querySelector('meta[name="theme-color"]'); if(theme){var bg=getComputedStyle(document.documentElement).getPropertyValue('--paper').trim(); theme.setAttribute('content',bg)}
    })();
  </script>
  <script>
    (function () {
      var overlay = document.querySelector('.noise-overlay');
      if (!overlay) return;
      var canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      var ctx = canvas.getContext('2d');
      var idata = ctx.createImageData(128, 128);
      var buffer32 = new Uint32Array(idata.data.buffer);
      var len = buffer32.length;
      for (var i = 0; i < len; i++) {
        if (Math.random() < 0.5) buffer32[i] = 0xff000000;
      }
      ctx.putImageData(idata, 0, 0);
      overlay.style.backgroundImage = 'url(' + canvas.toDataURL() + ')';
      overlay.style.backgroundRepeat = 'repeat';
    })();
  </script>
  <script src="posts.js"></script>
  <script>
    (function(){
      var list=document.getElementById('postList');
      if(!list) return;
      var posts=(window.__SYNOMARE_POSTS__||[]).slice();
      if(!posts.length){
        var empty=document.createElement('li');
        empty.textContent='まだ記事がありません。';
        list.appendChild(empty);
        return;
      }
      posts.sort(function(a,b){
        var timeA=a&&a.date?Date.parse(a.date):NaN;
        var timeB=b&&b.date?Date.parse(b.date):NaN;
        if(timeA===timeB) return 0;
        if(isNaN(timeA)) return 1;
        if(isNaN(timeB)) return -1;
        return timeA<timeB?1:-1;
      });
      posts.forEach(function(post){
        var li=document.createElement('li');
        var link=document.createElement('a');
        link.href=post.href||post.slug+'.html';
        var title=document.createElement('strong');
        title.textContent=post.title;
        link.appendChild(title);
        if(post.date){
          var meta=document.createElement('div');
          meta.className='post-meta';
          var time=document.createElement('time');
          time.setAttribute('datetime',post.date);
          time.textContent=post.date;
          meta.appendChild(time);
          link.appendChild(meta);
        }
        if(post.summary){
          var summary=document.createElement('p');
          summary.textContent=post.summary;
          link.appendChild(summary);
        }
        if(post.year) li.dataset.year=post.year;
        if(post.yearMonth) li.dataset.yearMonth=post.yearMonth;
        if(post.tags && post.tags.length) li.dataset.tags=post.tags.join(',');
        li.appendChild(link);
        list.appendChild(li);
      });
    })();
  </script>
</body>
</html>
