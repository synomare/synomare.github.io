<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes — synomare</title>
  <meta name="description" content="synomare の雑記・断章。">
  <meta property="og:title" content="Notes — synomare">
  <meta property="og:description" content="synomare の雑記・断章。">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#f4f3ef">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400;1,500&family=Space+Mono:wght@400;700&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f4f3ef;
      --ink: #17140f;
      --red: #c41f1f;
      --dim: #8f887a;
      --line: #d9d5c9;
      --card: #fdfdfb;
      --mono: "Space Mono", Menlo, Consolas, monospace;
      --jp: "Zen Old Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
      --latin: "EB Garamond", "Times New Roman", serif;
    }

    html, body { overflow-x: hidden; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--jp);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100svh;
    }

    ::selection { background: var(--red); color: #fff; }
    a { color: inherit; text-decoration: none; }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    /* topbar */
    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.4em 1.6em;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--ink);
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      background: var(--paper);
      z-index: 500;
    }

    .topbar .brand { font-weight: 500; }
    .topbar .brand .jp { font-family: var(--jp); color: var(--dim); letter-spacing: 0.3em; margin-left: 1em; }
    .topbar .date { color: var(--red); }
    .topbar nav { margin-left: auto; display: flex; flex-wrap: wrap; gap: 0.4em 1.1em; }
    .topbar nav a:hover { background: var(--ink); color: var(--paper); }
    .topbar nav a[aria-current] { background: var(--ink); color: var(--paper); padding: 0 0.35em; }

    /* specimen tag (shared) */
    .tag {
      background: var(--card);
      border: 1px solid var(--ink);
      box-shadow: 3px 3px 0 rgba(23, 20, 15, 0.22);
      padding: 0.55rem 0.7rem 0.5rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.12em;
    }

    a.tag:hover { background: var(--ink); color: var(--paper); }
    .tag .no { display: block; color: var(--red); font-size: 0.85em; margin-bottom: 0.35em; }
    .tag .en { display: block; text-transform: uppercase; font-weight: 500; font-size: 1.05em; }
    .tag .jp { display: block; font-family: var(--jp); color: var(--dim); margin-top: 0.3em; letter-spacing: 0.3em; }
    a.tag:hover .jp { color: var(--paper); }

    /* section head */
    .sec-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--red);
      border-bottom: 1px solid var(--ink);
      padding-bottom: 0.5em;
      margin-bottom: 1.2em;
    }

    .sec-head .r { color: var(--dim); }

    /* red thread */
    .thread {
      position: absolute;
      height: 1px;
      background: var(--red);
      transform-origin: 0 0;
      pointer-events: none;
      opacity: 0.85;
      z-index: 4;
    }

    /* footer caption */
    footer.caption {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.4em 2em;
      padding: 0.7rem 1rem;
      border-top: 1px solid var(--ink);
      font-family: var(--mono);
      font-size: 0.56rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--paper);
    }

    footer.caption .r { color: var(--red); }
    footer.caption .d { color: var(--dim); }

    @media (max-width: 700px) {
      .topbar { font-size: 0.56rem; }
      .topbar nav { margin-left: 0; width: 100%; }
      .topbar .brand .jp { display: none; }
    }

    main { position: relative; padding: clamp(20px, 4vw, 56px) clamp(16px, 3.4vw, 44px) clamp(3rem, 6vw, 4.5rem); }
    .wrap { max-width: 80ch; }

    .display-row { display: flex; align-items: baseline; gap: 2rem; flex-wrap: wrap; margin: 0 0 clamp(1.2rem, 3vw, 2rem); }
    .display {
      margin: 0;
      font-family: var(--latin);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(3rem, 11vw, 8rem);
      letter-spacing: -0.03em;
      line-height: 0.8;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--ink);
    }
    .display-row .jp { font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.5em; text-transform: uppercase; color: var(--red); }

    .lead { margin: 0 0 1.6rem; font-size: 0.9rem; color: var(--dim); }

    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li { margin: 0; padding: 1.1em 0.3em; border-bottom: 1px solid var(--line); }
    .post-list a { display: block; }
    .post-list a:hover { background: var(--ink); color: var(--paper); }
    .post-list a:hover time { color: var(--paper); opacity: 0.75; }
    .post-list a:hover p { color: var(--paper); opacity: 0.75; }
    .post-list strong { display: inline; font-weight: 500; font-size: clamp(18px, 2.4vw, 26px); letter-spacing: -0.01em; }
    .post-list time { display: inline-block; color: var(--red); font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.15em; margin-right: 1em; }
    .post-list p { margin: .4rem 0 0; font-size: 0.82rem; color: var(--dim); }
    .post-meta { display: inline; }
  </style>
</head>

<body>
  <a class="sr-only" href="#main">Skip to Content</a>
  <header class="topbar">
    <a class="brand" href="../">SYNOMARE</a>
    <span class="date">JST <span id="d">----.--.--</span></span>
    <nav aria-label="site">
        <a href="../">INDEX</a>
        <a href="../works.html">WORKS</a>
        <a href="../notes/" aria-current="page">NOTES</a>
        <a href="../links.html">LINKS</a>
        <a href="../profile.html">PROFILE</a>
        <a href="mailto:synomare@gmail.com">CONTACT</a>
    </nav>
  </header>

  <main id="main">
    <div class="wrap">
      <section class="display-row">
        <h1 class="display">Notes</h1>
        <span class="jp">Journal — 雑記・断章</span>
      </section>
      <p class="lead">書いたものやメモをここにまとめています。新しい記事から順に並びます。</p>
      <div class="sec-head"><span>Entries — 投稿一覧</span></div>
      <ul class="post-list" id="postList" aria-live="polite"></ul>
    </div>
  </main>

  <footer class="caption">
    <span>SYNOMARE / NOTES — 雑記</span>
    <span class="d">&copy; <span id="year"></span> synomare — all rights reserved.</span>
  </footer>
  <script>
    (function () {
      function pad(n) { return n < 10 ? '0' + n : n; }
      var d = document.getElementById('d');
      if (d) {
        var now = new Date(Date.now() + (9 * 60 + new Date().getTimezoneOffset()) * 60000);
        d.textContent = now.getFullYear() + '.' + pad(now.getMonth() + 1) + '.' + pad(now.getDate());
      }
      var y = document.getElementById('year');
      if (y) y.textContent = new Date().getFullYear();
    })();
  </script>
  <script src="posts.js"></script>
  <script>
    (function(){
      var list=document.getElementById('postList');
      if(!list) return;
      var posts=(window.__SYNOMARE_POSTS__||[]).slice();
      if(!posts.length){
        var empty=document.createElement('li');
        empty.textContent='まだ記事がありません。';
        list.appendChild(empty);
        return;
      }
      posts.sort(function(a,b){
        var timeA=a&&a.date?Date.parse(a.date):NaN;
        var timeB=b&&b.date?Date.parse(b.date):NaN;
        if(timeA===timeB) return 0;
        if(isNaN(timeA)) return 1;
        if(isNaN(timeB)) return -1;
        return timeA<timeB?1:-1;
      });
      posts.forEach(function(post, i){
        var li=document.createElement('li');
        var link=document.createElement('a');
        link.href=post.href||post.slug+'.html';
        var meta=document.createElement('span');
        meta.className='post-meta';
        var time=document.createElement('time');
        if(post.date){ time.setAttribute('datetime',post.date); time.textContent=post.date; }
        meta.appendChild(time);
        link.appendChild(meta);
        var title=document.createElement('strong');
        title.textContent=post.title;
        link.appendChild(title);
        if(post.summary){
          var summary=document.createElement('p');
          summary.textContent=post.summary;
          link.appendChild(summary);
        }
        if(post.year) li.dataset.year=post.year;
        if(post.yearMonth) li.dataset.yearMonth=post.yearMonth;
        if(post.tags && post.tags.length) li.dataset.tags=post.tags.join(',');
        li.appendChild(link);
        list.appendChild(li);
      });
    })();
  </script>
</body>

</html>
